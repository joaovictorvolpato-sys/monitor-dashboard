<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SkyNode - Health Monitor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Monitoramento em Tempo Real</h1>
    </header>

    <main id="dashboard">
        <section id="card-cpu" class="card">
            <h2>CPU</h2>
            <p class="valor">0%</p>
        </section>

        <section id="card-ram" class="card">
            <h2>RAM</h2>
            <p class="valor">0 GB</p>
        </section>

        <section id="card-temp" class="card">
            <h2>Temperatura</h2>
            <p class="valor">0°C</p>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 SkyNode Solutions</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
